name: pii-scrub-check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: secret + PII scan (repo-wide)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so we can scan all tracked files (not just diffed ones)
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Ensure PyYAML
        shell: bash
        # PyYAML is pre-installed on ubuntu-latest runners but not on macos-latest.
        # Gate 7 (workflow syntax) and Gate 5 (cross-link checker) both need python3;
        # only Gate 7 imports yaml. Idempotent install keeps both matrix legs identical.
        run: python3 -m pip install --quiet pyyaml

      - name: Secret scan (entropy-required patterns)
        shell: bash
        run: |
          set -euo pipefail

          # Patterns from skill/references/secret-scan-guidance.md.
          # Entropy required after each prefix — bare prefixes (which appear
          # in documentation) must NOT trigger.
          PATTERNS=(
            'sk-or-v1-[A-Za-z0-9]{20,}'
            'sk-[A-Za-z0-9]{30,}'
            'ghp_[A-Za-z0-9]{30,}'
            'gho_[A-Za-z0-9]{30,}'
            'ghs_[A-Za-z0-9]{30,}'
            'eyJ[A-Za-z0-9_=-]{10,}\.[A-Za-z0-9_=-]{10,}\.[A-Za-z0-9_=-]{20,}'
            '[0-9]{8,12}:[A-Za-z0-9_-]{30,50}'
            'AKIA[A-Z0-9]{16}'
            'ASIA[A-Z0-9]{16}'
            'BEGIN [A-Z]+ PRIVATE KEY'
          )

          HITS=0
          for pat in "${PATTERNS[@]}"; do
            # Use git grep so we only scan tracked content (not vendored deps if any are ever added).
            # Exclusion list MUST match scripts/verify.sh's gate_1_secrets() exclusions.
            if matches="$(git grep -nE "$pat" -- ':!.github/workflows/pii-scrub-check.yml' ':!.githooks/pre-commit' ':!skill/references/secret-scan-guidance.md' ':!skill/commands/cb-ingest.md' ':!skill/commands/cb-save-sync.md' ':!scripts/verify.sh' 2>/dev/null || true)"; then
              if [ -n "$matches" ]; then
                echo "::error::Secret pattern matched: $pat"
                echo "$matches" | head -10
                HITS=$((HITS + 1))
              fi
            fi
          done

          if [ "$HITS" -gt 0 ]; then
            echo
            echo "Secret-scan FAILED: $HITS pattern(s) matched."
            echo "Files documenting the patterns themselves are excluded:"
            echo "  - .github/workflows/pii-scrub-check.yml (this file)"
            echo "  - .githooks/pre-commit"
            echo "  - skill/references/secret-scan-guidance.md"
            echo "  - skill/commands/cb-ingest.md"
            echo "  - skill/commands/cb-save-sync.md"
            echo "  - scripts/verify.sh"
            echo
            echo "If a real key matches, rotate it immediately, then redact + force-push."
            echo "If documentation matches (e.g. you added a new doc page), add the path to the exclusion list."
            exit 1
          fi

          echo "Secret scan clean (${#PATTERNS[@]} patterns, repo-wide)."

      - name: PII / proper-noun scan
        shell: bash
        run: |
          set -euo pipefail

          # Public-repo baseline: no real personal-project names from the author's
          # workspace should appear in context-bridge OSS commits. This list is
          # intentionally short — the local .githooks/pre-commit + .cb-scrub-list
          # carry the full per-machine scrub list (which itself is gitignored).
          PATTERNS=(
            'Plant Sage'
            'Kahaani'
            'KahaaniBlog'
            'Wealth Builder'
            'sage-bot'
            'sage-hermes'
            'sagebotAI'
            'kahaaniblog'
            'kahaaniastudio'
            'srv1134430'
            'aksheyw@gmail'
          )

          HITS=0
          for pat in "${PATTERNS[@]}"; do
            # Exclusion list MUST match scripts/verify.sh's gate_2_pii() exclusions —
            # both files document the pattern list literally for transparency.
            if matches="$(git grep -nF "$pat" -- ':!.github/workflows/pii-scrub-check.yml' ':!scripts/verify.sh' 2>/dev/null || true)"; then
              if [ -n "$matches" ]; then
                echo "::error::PII pattern matched: $pat"
                echo "$matches" | head -10
                HITS=$((HITS + 1))
              fi
            fi
          done

          if [ "$HITS" -gt 0 ]; then
            echo
            echo "PII-scan FAILED: $HITS proper-noun pattern(s) matched."
            echo "Files documenting the patterns themselves are excluded:"
            echo "  - .github/workflows/pii-scrub-check.yml (this file)"
            echo "  - scripts/verify.sh"
            echo
            echo "Scrub before merging. The OSS repo must not reference private projects."
            exit 1
          fi

          echo "PII scan clean (${#PATTERNS[@]} patterns, repo-wide)."

      - name: Skill body line-count gate
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f skill/SKILL.md ]; then
            echo "skill/SKILL.md missing — skipping line-count gate."
            exit 0
          fi
          lines="$(wc -l < skill/SKILL.md | tr -d ' ')"
          echo "skill/SKILL.md: $lines lines (budget: 200)"
          if [ "$lines" -gt 200 ]; then
            echo "::error::skill/SKILL.md exceeds the 200-line body budget. Move deep content into references/."
            exit 1
          fi
          echo "Line-count gate OK."

      - name: Karpathy gist linked on every mention (gate 4)
        shell: bash
        run: |
          set -euo pipefail
          GIST='https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f'
          ORPHANS=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if ! grep -qF "$GIST" "$f"; then
              echo "::error file=$f::file mentions Karpathy but doesn't link the canonical gist ($GIST)"
              ORPHANS=$((ORPHANS+1))
            fi
          done < <(git grep -li 'karpathy' -- 'skill/**' 'docs/**' 'examples/**' 'README.md' 'CREDITS.md' 'CHANGELOG.md' 2>/dev/null || true)
          if [ "$ORPHANS" -gt 0 ]; then
            echo "Karpathy-link gate FAILED: $ORPHANS file(s) mention Karpathy without linking the gist."
            exit 1
          fi
          echo "Karpathy-link gate OK."

      - name: Relative cross-links resolve (gate 5)
        shell: bash
        run: |
          set -euo pipefail
          python3 << 'PY'
          import os, re, sys
          base = os.getcwd()
          broken = []
          checked = 0
          for root, dirs, files in os.walk(base):
              if '/.git' in root or 'examples/ExampleApp/snapshots' in root or 'node_modules' in root:
                  continue
              for f in files:
                  if not f.endswith('.md'): continue
                  path = os.path.join(root, f)
                  try:
                      with open(path, 'r', errors='replace') as fh: content = fh.read()
                  except Exception:
                      continue
                  for m in re.finditer(r'\]\(([^)]+)\)', content):
                      link = m.group(1).strip()
                      if link.startswith(('http://', 'https://', 'mailto:', '#')): continue
                      lc = link.split('#')[0].split('?')[0]
                      if not lc: continue
                      if '/' not in lc and not lc.endswith(('.md', '.yml', '.yaml', '.gif', '.snippet', '.sh', '.png', '.jpg')):
                          continue
                      checked += 1
                      resolved = os.path.normpath(os.path.join(os.path.dirname(path), lc))
                      if not os.path.exists(resolved):
                          broken.append((os.path.relpath(path, base), link))
          if broken:
              for src, lk in broken:
                  print(f"::error file={src}::broken cross-link: {lk}")
              print(f"\nCross-link gate FAILED: {len(broken)} / {checked} broken.")
              sys.exit(1)
          print(f"Cross-link gate OK ({checked} relative links resolve).")
          PY

      - name: Frontmatter on SKILL.md + commands (gate 6)
        shell: bash
        run: |
          set -euo pipefail
          MISSING=0
          for f in skill/SKILL.md skill/commands/*.md; do
            [ -f "$f" ] || continue
            if [ "$(head -1 "$f")" != "---" ]; then
              echo "::error file=$f::missing YAML frontmatter (first line must be '---')"
              MISSING=$((MISSING+1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "Frontmatter gate FAILED: $MISSING file(s) missing."
            exit 1
          fi
          echo "Frontmatter gate OK."

      - name: Hook + workflow syntax (gate 7)
        shell: bash
        run: |
          set -euo pipefail
          ERRORS=0
          if [ -f .githooks/pre-commit ]; then
            if ! bash -n .githooks/pre-commit; then
              echo "::error file=.githooks/pre-commit::bash syntax error"
              ERRORS=$((ERRORS+1))
            fi
          fi
          # YAML self-check via PyYAML
          if ! python3 -c "import yaml; yaml.safe_load(open('.github/workflows/pii-scrub-check.yml'))"; then
            echo "::error file=.github/workflows/pii-scrub-check.yml::YAML parse error"
            ERRORS=$((ERRORS+1))
          fi
          if [ "$ERRORS" -gt 0 ]; then
            echo "Hook + workflow syntax gate FAILED: $ERRORS error(s)."
            exit 1
          fi
          echo "Hook + workflow syntax gate OK."

      - name: Shellcheck on pre-commit hook (gate 8)
        shell: bash
        # bash -n only catches syntax errors. shellcheck catches semantic bugs
        # (unquoted vars, broken array expansions, fragile pipes) of the same
        # class as the grep -c bug we hit in scripts/verify.sh during v0.1.1.
        # Pre-installed on both ubuntu-latest and macos-latest runners.
        run: |
          set -euo pipefail
          if [ ! -f .githooks/pre-commit ]; then
            echo ".githooks/pre-commit not found — skipping shellcheck."
            exit 0
          fi
          if ! command -v shellcheck >/dev/null 2>&1; then
            echo "::error::shellcheck not available on $(uname -s) runner"
            exit 1
          fi
          shellcheck --version | head -3
          shellcheck .githooks/pre-commit
          echo "Shellcheck gate OK."
